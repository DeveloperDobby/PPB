name: PicklePlus Multi-Service Host Watch

# Runs for just under GitHub Actions' 6-hour job limit.
# During each run, the PicklePlus API is checked every 5 minutes:
#   request_interval: 300
#   max_attempts: 72

on:
  schedule:
    - cron: "35 1-23/3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 359

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip >/dev/null 2>&1
          python -m pip install --quiet -r requirements.txt >/dev/null 2>&1

      - name: Cancel previously running workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          query="repos/${REPO}/actions/workflows/auto-launch.yml/runs?per_page=100"
          jq_filter=".workflow_runs[] | select(.status != \"completed\") | select(.id < ${CURRENT_RUN_ID}) | .id"
          older=$(gh api "${query}" --jq "${jq_filter}" 2>/dev/null || true)
          for id in ${older}; do
            gh api -X POST "repos/${REPO}/actions/runs/${id}/cancel" >/dev/null 2>&1 || true
          done
          for _ in $(seq 1 12); do
            remaining=$(gh api "${query}" --jq "${jq_filter}" 2>/dev/null | grep -c . || true)
            [ "${remaining:-0}" -eq 0 ] && break
            sleep 5
          done

      - name: Run PicklePlus multi-service host watcher
        env:
          # Watcher settings only. Do not include Discord fields in this JSON.
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
          # Discord settings are loaded only from separate secrets.
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python run_alert_bot.py
